[package]
name = "solana-reserved-account-keys"
description = "Reserved Solana account keys"
documentation = "https://docs.rs/solana-reserved-account-keys"
version = { workspace = true }
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
edition = { workspace = true }

[dependencies]
lazy_static = { workspace = true, optional = true }
solana-feature-set = { workspace = true, optional = true }
solana-frozen-abi = { workspace = true, optional = true, features = [
    "frozen-abi",
] }
solana-frozen-abi-macro = { workspace = true, optional = true, features = [
    "frozen-abi",
] }
solana-pubkey = { workspace = true, default-features = false }

[dev-dependencies]
solana-reserved-account-keys = { path = ".", features = ["dev-context-only-utils"] }

[features]
dev-context-only-utils = ["std"]
frozen-abi = ["dep:solana-frozen-abi", "dep:solana-frozen-abi-macro", "std"]
std = ["dep:lazy_static", "dep:solana-feature-set"]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true
